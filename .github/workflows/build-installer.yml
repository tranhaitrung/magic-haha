name: Build Windows Installer

on:
  # Chay khi push tag vd: git tag v1.0.0 && git push --tags
  push:
    tags:
      - "v*"
  # Cho phep chay thu cong tren GitHub UI
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      # -------------------------------------------------------
      # 1. Checkout code
      # -------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # -------------------------------------------------------
      # 2. Tai Python embeddable cho Windows x64
      # -------------------------------------------------------
      - name: Download Python embeddable
        shell: pwsh
        run: |
          $ver = "3.11.9"
          $zip = "python-$ver-embed-amd64.zip"
          $url = "https://www.python.org/ftp/python/$ver/$zip"
          Invoke-WebRequest -Uri $url -OutFile $zip -UseBasicParsing
          Expand-Archive -Path $zip -DestinationPath "python" -Force
          Remove-Item $zip

      # -------------------------------------------------------
      # 3. Bat import site, cai pip
      # -------------------------------------------------------
      - name: Enable site-packages and install pip
        shell: pwsh
        run: |
          $pth = Get-ChildItem "python\*.pth" | Select-Object -First 1
          (Get-Content $pth.FullName) -replace '#import site','import site' |
            Set-Content $pth.FullName

          Invoke-WebRequest -Uri "https://bootstrap.pypa.io/get-pip.py" `
            -OutFile "get-pip.py" -UseBasicParsing
          .\python\python.exe get-pip.py --quiet
          Remove-Item get-pip.py

      # -------------------------------------------------------
      # 4. Cai dependencies
      # -------------------------------------------------------
      - name: Install Python dependencies
        shell: cmd
        run: python\python.exe -m pip install -r requirements.txt --quiet

      # -------------------------------------------------------
      # 5. Tai Playwright Chromium
      # -------------------------------------------------------
      - name: Install Playwright Chromium
        shell: cmd
        run: python\python.exe -m playwright install chromium

      # -------------------------------------------------------
      # 6. Cai Inno Setup
      # -------------------------------------------------------
      - name: Install Inno Setup
        shell: pwsh
        run: |
          $url = "https://files.jrsoftware.org/is/6/innosetup-6.3.3.exe"
          Invoke-WebRequest -Uri $url -OutFile "innosetup.exe" -UseBasicParsing
          Start-Process -FilePath "innosetup.exe" `
            -ArgumentList "/VERYSILENT /SUPPRESSMSGBOXES /NORESTART" `
            -Wait
          Remove-Item innosetup.exe

      # -------------------------------------------------------
      # 7. Compile installer
      # -------------------------------------------------------
      - name: Build installer with Inno Setup
        shell: cmd
        run: |
          if not exist "dist" mkdir dist
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" FBScanner.iss

      # -------------------------------------------------------
      # 8. Upload artifact (tai ve tu GitHub UI)
      # -------------------------------------------------------
      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: FBScanner_Setup
          path: dist\FBScanner_Setup.exe
          retention-days: 30

      # -------------------------------------------------------
      # 9. Neu la tag release, tu dong tao GitHub Release
      # -------------------------------------------------------
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist\FBScanner_Setup.exe
          name: "FB Scanner ${{ github.ref_name }}"
          body: |
            ## Huong dan cai dat
            1. Tai file `FBScanner_Setup.exe` ben duoi
            2. Double-click → Next → Next → Finish
            3. Mo icon **FB Affiliate Scanner** tren Desktop
