image: amake/innosetup

pipelines:
  # Chay khi push tag vd: git tag v1.0.0 && git push --tags
  tags:
    'v*':
      - step: &build-installer
          name: Build Windows Installer (Linux cloud runner)
          script:
            # 0. Cai cac tool can thiet
            - apt-get update -qq && apt-get install -y -qq wget unzip

            # 1. Tai Python Windows embeddable (chi la zip, khong can chay)
            - |
              PY_VER="3.11.9"
              PY_ZIP="python-${PY_VER}-embed-amd64.zip"
              wget -q "https://www.python.org/ftp/python/${PY_VER}/${PY_ZIP}"
              unzip -q "${PY_ZIP}" -d python/
              rm "${PY_ZIP}"

            # 2. Bat import site trong .pth de pip hoat dong sau nay
            - sed -i 's/#import site/import site/' python/python311._pth

            # 3. Tai get-pip.py (bundle vao installer, user chay o may Windows)
            - wget -q https://bootstrap.pypa.io/get-pip.py -O python/get-pip.py

            # 4. Compile installer bang Inno Setup (qua Wine, co san trong amake/innosetup)
            - mkdir -p dist
            - iscc FBScanner.iss

          artifacts:
            - dist/FBScanner_Setup.exe

  # Chay thu cong tren Bitbucket UI
  custom:
    build-installer:
      - step: *build-installer
