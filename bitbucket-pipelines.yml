image: atlassian/default-image:4

definitions:
  steps:
    - step: &build-windows-installer
        name: Build Windows Installer
        # Chay tren Windows self-hosted runner
        runs-on:
          - self.hosted
          - windows
        script:
          # 1. Tai Python embeddable
          - |
            if (-not (Test-Path "python\python.exe")) {
              $ver = "3.11.9"
              $zip = "python-$ver-embed-amd64.zip"
              $url = "https://www.python.org/ftp/python/$ver/$zip"
              Invoke-WebRequest -Uri $url -OutFile $zip -UseBasicParsing
              Expand-Archive -Path $zip -DestinationPath "python" -Force
              Remove-Item $zip
            }

          # 2. Bat import site, cai pip
          - |
            $pth = Get-ChildItem "python\*.pth" | Select-Object -First 1
            (Get-Content $pth.FullName) -replace '#import site','import site' |
              Set-Content $pth.FullName
            Invoke-WebRequest -Uri "https://bootstrap.pypa.io/get-pip.py" `
              -OutFile "get-pip.py" -UseBasicParsing
            .\python\python.exe get-pip.py --quiet
            Remove-Item get-pip.py

          # 3. Cai dependencies
          - python\python.exe -m pip install -r requirements.txt --quiet

          # 4. Tai Playwright Chromium
          - python\python.exe -m playwright install chromium

          # 5. Cai Inno Setup neu chua co
          - |
            if (-not (Test-Path "C:\Program Files (x86)\Inno Setup 6\ISCC.exe")) {
              $url = "https://files.jrsoftware.org/is/6/innosetup-6.3.3.exe"
              Invoke-WebRequest -Uri $url -OutFile "innosetup.exe" -UseBasicParsing
              Start-Process -FilePath "innosetup.exe" `
                -ArgumentList "/VERYSILENT /SUPPRESSMSGBOXES /NORESTART" -Wait
              Remove-Item innosetup.exe
            }

          # 6. Compile installer
          - if (-not (Test-Path "dist")) { New-Item -ItemType Directory -Path "dist" }
          - '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" FBScanner.iss'

        artifacts:
          - dist/FBScanner_Setup.exe

pipelines:
  # Chay khi push tag vd: git tag v1.0.0
  tags:
    'v*':
      - step: *build-windows-installer

  # Cho phep chay thu cong tren Bitbucket UI
  custom:
    build-installer:
      - step: *build-windows-installer
